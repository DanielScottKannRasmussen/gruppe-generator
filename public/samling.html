  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bord generator</title>
    <link rel="stylesheet" href="style.css" />
   
  </head>
  <body>
    <main>
      <h1>Bord generator</h1>
      <p>Tilføj elever til listen, hvorefter en bord plan vil blive genereret ud fra elev relation, bord antal og elev pr. bord</p>
<!-- Sektion til indstillinger for borde -->
      <section class="controls" aria-label="Bord indstillinger">
        <label>
<!-- Input: hvor mange elever pr. bord -->
          Elever pr. bord
          <input id="eleverPerBordInput" type="number" min="1" value="0" />
        </label>
        <label>
<!-- Input: samlet antal elever -->
          Antal elever i alt
          <input id="antalEleverInput" type="number" min="1" value="0" />
        </label>
<!-- Knap til at opdatere bord-opdelingen -->
        <button id="opdaterValgKnap" type="button">Opdater borde</button>
      </section>
<!-- Formular til at tilføje en elev -->
      <section class="elev-form" aria-label="Tilføj elev">
        <label>
<!-- Input: elevens navn -->          
          Elev navn
          <input id="navnInput" type="text" placeholder="Skriv elevens navn" />
        </label>
        <label>
<!-- Input: gode venner (relationer der ønskes sammen) -->
          Gode venner
          <input id="godeVennerInput" type="text" placeholder="Navn på god ven" />
        </label>
        <label>
<!-- Input: dårlige venner (relationer der ønskes adskilt) -->
          Darlige venner
          <input id="dårligeVennerInput" type="text" placeholder="Navn på darlig ven" />
        </label>
        <button id="tilføjKnap" type="button">Tilføj til liste</button>
      </section>
<!-- Notifikationsområde (toast beskeder) -->
      <div id="toast" aria-live="polite"></div>
<!-- Her bliver bordplanen vist dynamisk -->
      <section id="app" aria-label="Bord-oversigt"></section>
    </main>

   <!-- JavaScript filer der styrer funktionaliteten -->
    <script src="valg.js"></script>        <!-- håndterer valg/inputs -->
    <script src="WFC.js"></script>         <!-- algoritme (Wave Function Collapse) -->
    <script src="borde.js"></script>       <!-- generering af borde -->
    <script src="opret-elev.js"></script>  <!-- håndtering af elev-oprettelse -->
  </body>
</html>
